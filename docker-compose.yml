services:
  quote-api:
    build: ./quote-service
    ports:
      - "8000:8000"
    environment:
      # instabilidade simulada (de proposito) -- ajuste se quiser durante o dev
      QUOTE_FAILURE_RATE: "0.20"
      QUOTE_SLOW_RATE: "0.10"
      QUOTE_SLOW_SECONDS: "8"
      # QUOTE_SEED: "42"   # descomente p/ falhas reproduziveis
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  agent-service:
    build: ./agent-service
    ports:
      - "8080:8080"
    # Loads LLM_PROVIDER/LLM_MODEL/OPENAI_API_KEY/etc. from the real, gitignored
    # agent-service/.env (copy agent-service/.env.example first — see root README).
    # No credentials live in this file.
    env_file:
      - ./agent-service/.env
    environment:
      # Overrides the .env's localhost default so the container reaches
      # quote-api by its service name on the compose network, not localhost.
      QUOTE_SERVICE_BASE_URL: http://quote-api:8000
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173}
    depends_on:
      quote-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      # Must be reachable from the browser on the host, so this is the
      # published port, not the internal service name/network.
      VITE_AGENT_SERVICE_URL: http://localhost:8080
    depends_on:
      agent-service:
        condition: service_healthy

volumes:
  # Named volume, not a bind mount, so the container's Linux-native
  # dependencies (esbuild/rollup binaries) never collide with whatever
  # platform-specific node_modules already exist on the host.
  frontend_node_modules:
